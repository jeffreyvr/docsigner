<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.bunny.net/css?family=inter:500,600,700,800');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: #141414;
        background: #fbfaf8;
      }

      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        padding: 72px 88px;
        overflow: hidden;
        background: #fbfaf8;
      }

      .bar {
        position: absolute;
        inset: 0 0 auto 0;
        height: 8px;
        background: linear-gradient(90deg, #70f69a 0%, #5c63ff 28%, #070082 100%);
      }

      .glow-green {
        position: absolute;
        right: -160px;
        top: -180px;
        width: 560px;
        height: 560px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(112, 246, 154, 0.22),
          rgba(112, 246, 154, 0) 62%
        );
        pointer-events: none;
      }

      .glow-blue {
        position: absolute;
        left: -180px;
        bottom: -220px;
        width: 620px;
        height: 620px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(7, 0, 130, 0.14),
          rgba(7, 0, 130, 0) 62%
        );
        pointer-events: none;
      }

      .brand {
        position: relative;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .brand svg {
        width: 46px;
        height: 43px;
        display: block;
      }

      .brand-name {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .main {
        position: relative;
        margin-top: 64px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        max-width: 820px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 10px 18px;
        border-radius: 999px;
        background: rgba(112, 246, 154, 0.28);
        border: 2px solid #141414;
        color: #07300f;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        font-size: 78px;
        font-weight: 800;
        letter-spacing: -0.035em;
        line-height: 1.02;
      }

      h1 .hl {
        background: linear-gradient(
          transparent 58%,
          #70f69a 58%,
          #70f69a 92%,
          transparent 92%
        );
      }

      .lead {
        font-size: 28px;
        font-weight: 500;
        line-height: 1.4;
        color: #3a3a38;
        max-width: 28ch;
      }

      .footer {
        position: absolute;
        left: 88px;
        right: 88px;
        bottom: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .bullets {
        display: flex;
        gap: 28px;
        font-size: 20px;
        font-weight: 600;
        color: #55554f;
      }

      .bullets span {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .sq {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        background: #70f69a;
        border: 1.5px solid #141414;
        flex-shrink: 0;
      }

      .mock {
        position: absolute;
        right: 72px;
        top: 150px;
        width: 280px;
        height: 340px;
        background: #fff;
        border: 3px solid #141414;
        border-radius: 8px;
        box-shadow: 10px 10px 0 #70f69a;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .mock-line {
        height: 10px;
        border-radius: 4px;
        background: #e8e6e0;
      }

      .mock-line.short {
        width: 55%;
      }

      .mock-line.mid {
        width: 78%;
      }

      .mock-sig {
        margin-top: auto;
        align-self: flex-end;
        width: 168px;
        height: 72px;
        position: relative;
      }

      .mock-sig svg {
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="bar"></div>
      <div class="glow-green"></div>
      <div class="glow-blue"></div>

      <div class="brand">
        <svg viewBox="0 0 530.7 500" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            d="M225.5,0l-113.3,398h371.4l-107.1-162.2c45.9,0,121.4-26.5,148-109.2C552,41.8,484.7,0,398,0h-172.4Z"
            fill="#70f69a"
          />
          <polygon
            points="418.4 142.9 198 142.9 122.4 398 244.9 398 418.4 142.9"
            fill="#65e583"
          />
          <polygon
            points="245.1 397.9 142.1 397.9 118.4 500 176.8 498.9 245.1 397.9"
            fill="#d4d4d8"
          />
          <polygon points="0 81.6 387.8 81.6 118.4 500 0 81.6" fill="#070082" />
        </svg>
        <span class="brand-name">vanrossum.dev</span>
      </div>

      <div class="main">
        <span class="chip">Free tool</span>
        <h1>DocSigner</h1>
        <p class="lead">
          Sign PDFs in your browser.<br />
          Nothing is uploaded — docs stay private.
        </p>
      </div>

      <div class="mock" aria-hidden="true">
        <div class="mock-line"></div>
        <div class="mock-line mid"></div>
        <div class="mock-line short"></div>
        <div class="mock-line mid"></div>
        <div class="mock-line"></div>
        <div class="mock-line short"></div>
        <!-- Sharp, spiky signature mark for the mock document -->
        <div class="mock-sig">
          <svg viewBox="0 0 200 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M6 62
                 L14 58 L22 18 L28 70 L36 8 L44 74 L52 12 L58 68
                 L66 6 L74 72 L82 14 L88 66 L96 4 L104 70 L112 16
                 L120 64 L128 10 L136 68 L144 22 L152 58 L160 28
                 L168 52 L176 34 L186 48 L194 40"
              stroke="#070082"
              stroke-width="3.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M18 78 Q100 86 188 74"
              stroke="#070082"
              stroke-width="2.4"
              stroke-linecap="round"
            />
          </svg>
        </div>
      </div>

      <div class="footer">
        <div class="bullets">
          <span><i class="sq"></i> No account</span>
          <span><i class="sq"></i> Client-side only</span>
          <span><i class="sq"></i> Multi-page PDFs</span>
        </div>
      </div>
    </div>
  </body>
</html>
